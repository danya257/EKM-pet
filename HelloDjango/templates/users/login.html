<!-- templates/users/login.html -->
{% extends 'base.html' %}

{% block content %}
<div class="card">
  <div class="text-center mb-0">
    <h1>👋 Добро пожаловать!</h1>
    <p>Войдите в свой аккаунт</p>
  </div>

  <form method="post" style="margin-top: 1.5rem;">
    {% csrf_token %}

    <div class="input-group">
      {{ form.username }}
      <label for="{{ form.username.id_for_label }}">Имя пользователя</label>
    </div>

    <div class="input-group">
      {{ form.password }}
      <label for="{{ form.password.id_for_label }}">Пароль</label>
    </div>

    <button type="submit" class="btn" style="width: 100%;">Войти</span></button>
  </form>

  <div class="text-center mt-4">
    <p class="mb-0">Нет аккаунта? <a href="{% url 'users:register' %}" class="btn-link">Зарегистрироваться</a></p>
  </div>
</div>
{% endblock %}

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.input-group input').forEach(input => {
    // Сохраняем оригинальный placeholder в data-атрибут
    const originalPlaceholder = input.getAttribute('placeholder') || '';
    input.setAttribute('data-placeholder', originalPlaceholder);
    
    // Функция обновления placeholder
    const updatePlaceholder = () => {
      if (input.value.length > 0 || document.activeElement === input) {
        input.setAttribute('placeholder', '');
      } else {
        input.setAttribute('placeholder', originalPlaceholder);
      }
    };
    
    // Слушаем события
    input.addEventListener('input', updatePlaceholder);
    input.addEventListener('focus', updatePlaceholder);
    input.addEventListener('blur', updatePlaceholder);
    
    // Проверяем при загрузке (автозаполнение)
    setTimeout(updatePlaceholder, 100);
  });
});
</script>
